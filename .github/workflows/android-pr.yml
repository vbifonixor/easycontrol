name: Android PR

on:
  pull_request:
    paths:
      - 'easycontrolfork/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: easycontrolfork
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build bundled server JAR
        run: ./gradlew :server:copyDebug
      - name: Build and lint debug APK
        run: ./gradlew :app:assembleDebug :app:lintDebug
      - uses: actions/upload-artifact@v4
        with:
          name: easycontrolfork-debug-apk
          path: easycontrolfork/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
      - name: Calculate APK hash
        id: apk
        run: |
          echo "sha256=$(sha256sum app/build/outputs/apk/debug/app-debug.apk | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "url=$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Comment on pull request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- easycontrolfork-pr-build -->';
            const body = `${marker}
            ## Android PR build

            Debug APK: [download from this workflow run](${{ steps.apk.outputs.url }})

            - Commit: \`${{ github.event.pull_request.head.sha }}\`
            - SHA-256: \`${{ steps.apk.outputs.sha256 }}\`
            `;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
