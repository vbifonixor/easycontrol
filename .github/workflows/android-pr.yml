name: Android PR

on:
  pull_request:
    paths:
      - 'easycontrolfork/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: easycontrolfork
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build bundled server JAR
        run: ./gradlew :server:copyDebug
      - name: Build and lint debug APK
        run: ./gradlew :app:assembleDebug :app:lintDebug
      - uses: actions/upload-artifact@v4
        with:
          name: easycontrolfork-debug-apk
          path: easycontrolfork/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
